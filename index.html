<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khair-Eddine Mohamed · Architect & CG Artist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Outfit:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --clay:#C2674A;
    --brick:#993C1D;
    --clay-tint:#FAECE7;
    --clay-mid:#E8C9BB;
    --ink:#1c1a17;
    --paper:#fdfcfa;
    --paper-2:#f5f2ec;
    --muted:#6b6760;
    --hint:#9b968d;
    --line:rgba(28,26,23,0.12);
    --line-2:rgba(28,26,23,0.22);
    --display:'Fraunces',serif;
    --sans:'Outfit',sans-serif;
    --mono:'JetBrains Mono',monospace;
    --maxw:1180px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    line-height:1.7;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
  }
  img{max-width:100%;display:block;}
  a{color:inherit;text-decoration:none;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}

  /* ---------- NAV ---------- */
  header.nav{
    position:sticky;top:0;z-index:50;
    background:rgba(253,252,250,0.85);
    backdrop-filter:blur(10px);
    border-bottom:0.5px solid var(--line);
  }
  .nav-inner{
    max-width:var(--maxw);margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 32px;
  }
  .brand{font-size:15px;font-weight:500;letter-spacing:0.01em;cursor:pointer;}
  .brand .sep{color:var(--clay);}
  .brand .role{color:var(--hint);font-weight:400;}
  .nav-links{display:flex;gap:26px;align-items:center;font-size:13.5px;color:var(--muted);}
  .nav-links a{cursor:pointer;transition:color .2s;}
  .nav-links a:hover{color:var(--ink);}
  .nav-links a.active{color:var(--brick);font-weight:500;}
  .lang-toggle{
    cursor:pointer;font-size:13px;font-weight:500;color:var(--brick);
    border:0.5px solid var(--line-2);border-radius:7px;padding:4px 10px;
    transition:background .2s;
  }
  .lang-toggle:hover{background:var(--clay-tint);}
  .lang-toggle .off{color:var(--hint);font-weight:400;}

  /* ---------- LAYOUT ---------- */
  main{max-width:var(--maxw);margin:0 auto;}
  .page{display:none;animation:fade .5s ease;}
  .page.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* ---------- HOME HERO ---------- */
  .hero{padding:84px 32px 64px;}

  /* ---------- HELLO centered hero with rotating background ---------- */
  .hello-hero{position:relative;min-height:calc(100vh - 120px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 32px;overflow:hidden;}
  .hello-bg{position:absolute;inset:0;z-index:0;}
  .hello-bg .slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.6s ease;}
  .hello-bg .slide.on{opacity:1;}
  .hello-bg .slide.placeholder{background:linear-gradient(135deg,var(--clay-tint),var(--clay-mid));display:flex;align-items:center;justify-content:center;}
  .hello-bg .slide.placeholder span{font-family:var(--mono);font-size:12px;color:var(--brick);opacity:.6;}
  .hello-scrim{position:absolute;inset:0;z-index:1;background:rgba(253,252,250,0.74);}
  .hello-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;}
  .hello-inner .eyebrow{justify-content:center;}
  .hello-inner h1.title{max-width:760px;}
  .hello-inner .lede{margin-left:auto;margin-right:auto;}
  .hello-inner .statstrip{margin-left:auto;margin-right:auto;}

  /* ---------- VISION ---------- */
  .vision{padding:72px 32px 84px;border-top:0.5px solid var(--line);text-align:center;}
  .vision .v-eyebrow{font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--brick);margin-bottom:22px;}
  .vision p{font-family:var(--display);font-size:clamp(19px,2.4vw,26px);line-height:1.55;font-weight:400;max-width:760px;margin:0 auto;color:var(--ink);}

  /* ---------- centered between-lines heading (Work & Contact) ---------- */
  .centered-head{display:flex;align-items:center;justify-content:center;gap:22px;padding:64px 32px 8px;}
  .centered-head .hr{flex:0 0 60px;height:0.5px;background:var(--line-2);}
  .centered-head h1{font-family:var(--display);font-size:clamp(26px,4vw,40px);font-weight:500;letter-spacing:0.02em;text-transform:uppercase;}
  .centered-sub{text-align:center;font-size:15px;color:var(--muted);max-width:480px;margin:14px auto 0;padding:0 32px;}

  .eyebrow{display:flex;align-items:center;gap:11px;margin-bottom:24px;}
  .eyebrow .tick{width:26px;height:2px;background:var(--clay);display:inline-block;}
  .eyebrow span{font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--brick);}
  h1.title{
    font-family:var(--display);font-weight:500;font-size:clamp(34px,5.5vw,60px);
    line-height:1.05;letter-spacing:-0.02em;max-width:880px;
  }
  h1.title .accent{color:var(--clay);font-style:italic;}
  .lede{font-size:17px;line-height:1.7;color:var(--muted);max-width:560px;margin-top:26px;}

  .statstrip{
    display:flex;flex-wrap:wrap;margin-top:48px;
    border:0.5px solid var(--line);border-radius:10px;overflow:hidden;max-width:760px;
  }
  .statstrip .cell{flex:1;min-width:140px;padding:18px 22px;border-right:0.5px solid var(--line);}
  .statstrip .cell:last-child{border-right:none;}
  .statstrip .num{font-family:var(--display);font-size:26px;font-weight:500;}
  .statstrip .lbl{font-size:11px;color:var(--hint);letter-spacing:0.04em;margin-top:4px;}
  .metaline{margin-top:24px;display:flex;gap:22px;flex-wrap:wrap;font-size:12.5px;color:var(--hint);}
  .metaline .pin{color:var(--clay);}

  /* ---------- WORK INDEX ---------- */
  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:30px 32px 4px;border-top:0.5px solid var(--line);margin:0 0 0;
  }
  .section-head h2{font-family:var(--display);font-size:24px;font-weight:500;}
  .section-head .fr{color:var(--hint);font-weight:400;font-size:15px;font-family:var(--sans);}
  .section-head .yr{font-size:12px;color:var(--hint);letter-spacing:0.04em;}
  .windex{padding:8px 32px 60px;}
  .wrow{
    display:grid;grid-template-columns:58px 1fr auto;gap:20px;align-items:center;
    padding:22px 0;border-top:0.5px solid var(--line);cursor:pointer;transition:padding-left .25s,background .25s;
  }
  .wrow:hover{padding-left:10px;background:linear-gradient(to right,var(--clay-tint),transparent 60%);}
  .wrow .idx{font-family:var(--mono);font-size:13px;color:var(--clay);}
  .wrow .pname{font-family:var(--display);font-size:19px;font-weight:500;}
  .wrow .pmeta{font-size:13px;color:var(--muted);margin-top:3px;}
  .wrow .badge{
    font-size:11px;letter-spacing:0.06em;color:var(--brick);background:var(--clay-tint);
    padding:6px 11px;border-radius:7px;white-space:nowrap;
  }
  .wrow .arrow{color:var(--clay);opacity:0;transition:opacity .25s,transform .25s;transform:translateX(-6px);}
  .wrow:hover .arrow{opacity:1;transform:none;}

  /* ---------- PROJECT PAGE ---------- */
  .proj-top{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:0.5px solid var(--line);}
  .proj-top .back{font-size:14px;color:var(--muted);cursor:pointer;}
  .proj-top .back .a{color:var(--clay);}
  .proj-top .count{font-family:var(--mono);font-size:13px;color:var(--hint);}

  .phero{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--clay-mid);}
  .phero .ph-fill{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--brick);}
  .phero .ph-fill i{font-size:34px;}
  .phero .ph-fill .cap{font-size:13px;font-weight:500;margin-top:8px;}
  .phero .ph-fill .fn{font-size:11px;font-family:var(--mono);color:#b5613f;margin-top:3px;}
  .phero .scrim{position:absolute;left:0;right:0;bottom:0;height:60%;
    background:linear-gradient(to top,rgba(18,11,7,0.82),rgba(18,11,7,0.30) 55%,transparent);}
  .phero .htitle{position:absolute;left:0;right:0;bottom:0;padding:34px 32px 30px;}
  .phero .htitle .eb{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
  .phero .htitle .eb .tick{width:20px;height:2px;background:#E8956F;}
  .phero .htitle .eb span{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#F0C4B0;}
  .phero .htitle h1{font-family:var(--display);font-weight:500;font-size:clamp(32px,5vw,52px);color:#fff;line-height:1;letter-spacing:-0.02em;}
  .phero .htitle .loc{font-size:15px;color:rgba(255,255,255,0.85);margin-top:9px;}

  .pmeta-row{padding:32px;border-bottom:0.5px solid var(--line);}
  .pmeta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:26px 22px;}
  .pmeta-grid .k{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--hint);margin-bottom:7px;}
  .pmeta-grid .v{font-size:14px;}
  .pmeta-grid .v.phase{color:var(--brick);}

  .pintro{padding:48px 32px;max-width:680px;margin:0 auto;}
  .pintro p{font-family:var(--display);font-size:20px;line-height:1.6;font-style:italic;color:var(--ink);text-align:center;opacity:0.9;}

  .chapter{padding:0 32px;}
  .chapter .ch-head{
    font-size:13px;letter-spacing:0.18em;text-transform:uppercase;color:var(--brick);
    border-top:0.5px solid var(--line);padding-top:20px;margin-top:14px;
  }
  .chapter .ch-head .sub{color:var(--hint);letter-spacing:0;text-transform:none;font-size:12px;}
  .chapter .ch-body{font-size:15px;line-height:1.75;color:var(--muted);max-width:680px;padding:18px 0 28px;}

  .imgslot{
    background:var(--paper-2);border:0.5px dashed var(--line-2);border-radius:8px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--hint);
    margin-bottom:16px;
  }
  .imgslot.warm{background:var(--clay-tint);border-color:var(--clay);color:var(--brick);}
  .imgslot i{font-size:24px;}
  .imgslot .cap{font-size:12px;margin-top:6px;text-align:center;padding:0 12px;}
  .imgslot .fn{font-size:10px;font-family:var(--mono);margin-top:3px;}
  .imgslot.r43{aspect-ratio:4/3;}
  .imgslot.r32{aspect-ratio:3/2;}
  .imgslot.r169{aspect-ratio:16/9;}
  .imgslot.r219{aspect-ratio:21/9;}
  .imgslot.rtall{aspect-ratio:9/16;}
  .imgslot.rsquare{aspect-ratio:1/1;}
  .imgslot.rstrip{aspect-ratio:32/9;}
  .imgpair{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .imgquad{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  /* tall layout: vertical image beside a stack of content */
  .imgtall-row{display:grid;grid-template-columns:0.62fr 1fr;gap:16px;align-items:start;}
  .imgtall-row .imgslot.rtall{aspect-ratio:3/4;height:100%;}
  .chapter-imgs{padding-bottom:8px;}

  .pfoot{display:flex;justify-content:space-between;padding:24px 32px;border-top:0.5px solid var(--line);font-size:13.5px;margin-top:20px;}
  .pfoot .back{color:var(--hint);cursor:pointer;}
  .pfoot .next{color:var(--brick);font-weight:500;cursor:pointer;}

  /* ---------- ABOUT ---------- */
  .about-intro{padding:56px 32px 40px;display:grid;grid-template-columns:148px 1fr;gap:34px;align-items:start;}
  .portrait{width:148px;height:148px;border-radius:12px;background:var(--clay-tint);display:flex;align-items:center;justify-content:center;border:0.5px solid var(--line);}
  .portrait span{font-family:var(--display);font-size:38px;font-weight:500;color:var(--brick);}
  .about-intro h1{font-family:var(--display);font-size:28px;font-weight:500;line-height:1.25;letter-spacing:-0.01em;max-width:540px;margin-bottom:16px;}
  .about-intro .bio{font-size:15px;line-height:1.75;color:var(--muted);max-width:580px;}
  .about-contact{margin-top:18px;display:flex;gap:18px;flex-wrap:wrap;font-size:12.5px;color:var(--hint);}
  .about-contact i{color:var(--clay);}
  .xp{padding:8px 32px 24px;}
  .xp-head{font-family:var(--display);font-size:22px;font-weight:500;border-top:0.5px solid var(--line);padding-top:24px;}
  .xp-head .fr{color:var(--hint);font-size:14px;font-family:var(--sans);font-weight:400;}
  .xprow{display:grid;grid-template-columns:160px 1fr;gap:24px;padding:20px 0;border-top:0.5px solid var(--line);}
  .xprow .when{font-size:13px;font-weight:500;}
  .xprow .where{font-size:12px;color:var(--hint);margin-top:3px;}
  .xprow .role{font-size:15px;font-weight:500;}
  .xprow .desc{font-size:13.5px;color:var(--muted);line-height:1.6;margin-top:5px;}
  .creds{padding:8px 32px 60px;display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:28px;border-top:0.5px solid var(--line);padding-top:28px;}
  .creds .ck{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--brick);margin-bottom:13px;}
  .creds .ci{font-size:13.5px;color:var(--muted);line-height:1.9;}
  .creds .ci b{color:var(--ink);font-weight:500;}

  /* ---------- CONTACT ---------- */
  .contact{padding:72px 32px;}
  .contact-centered{padding-top:24px;}
  .contact-centered .links{margin-left:auto;margin-right:auto;}
  .contact-centered .clink{justify-content:center;}
  .contact h1{font-family:var(--display);font-size:clamp(30px,5vw,48px);font-weight:500;letter-spacing:-0.02em;}
  .contact h1 .accent{color:var(--clay);font-style:italic;}
  .contact .links{margin-top:34px;display:flex;flex-direction:column;gap:2px;max-width:520px;}
  .contact .clink{display:flex;align-items:center;gap:14px;padding:16px 0;border-top:0.5px solid var(--line);font-size:16px;cursor:pointer;transition:padding-left .2s;}
  .contact .clink:hover{padding-left:8px;}
  .contact .clink i{color:var(--clay);font-size:20px;width:24px;}
  .contact .clink:last-child{border-bottom:0.5px solid var(--line);}

  footer.site{padding:30px 32px;border-top:0.5px solid var(--line);font-size:12px;color:var(--hint);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}

  /* ---------- CONTACT DOCK ---------- */
  .dock{position:fixed;right:24px;bottom:24px;z-index:60;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .dock-opts{display:flex;flex-direction:column;gap:12px;align-items:center;
    opacity:0;transform:translateY(12px) scale(0.9);pointer-events:none;
    transition:opacity .28s ease,transform .28s cubic-bezier(.2,.8,.2,1);}
  .dock.open .dock-opts{opacity:1;transform:none;pointer-events:auto;}
  .dock-opts a{
    width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:var(--paper);border:0.5px solid var(--line-2);color:var(--brick);
    box-shadow:0 6px 20px rgba(28,26,23,0.12);font-size:21px;cursor:pointer;
    transition:transform .2s,background .2s,color .2s;position:relative;
  }
  .dock-opts a:hover{transform:scale(1.08);background:var(--clay-tint);}
  .dock-opts a .tip{
    position:absolute;right:60px;top:50%;transform:translateY(-50%);
    background:var(--ink);color:var(--paper);font-size:11px;font-family:var(--sans);
    padding:5px 9px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .dock-opts a:hover .tip{opacity:1;}
  .dock-toggle{
    width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;
    background:var(--clay);color:#fff;font-size:25px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 26px rgba(194,103,74,0.4);transition:transform .3s cubic-bezier(.2,.8,.2,1),background .2s;
  }
  .dock-toggle:hover{background:var(--brick);}
  .dock.open .dock-toggle{transform:rotate(135deg);}
  .dock-opts a:nth-child(1){transition-delay:.02s;}
  .dock-opts a:nth-child(2){transition-delay:.06s;}
  .dock-opts a:nth-child(3){transition-delay:.10s;}

  /* ---------- WORK GRID ---------- */
  .work-head{padding:64px 32px 8px;}
  .work-head h1{font-family:var(--display);font-size:clamp(30px,5vw,46px);font-weight:500;letter-spacing:-0.02em;}
  .work-head h1 .accent{color:var(--clay);font-style:italic;}
  .work-head p{font-size:15px;color:var(--muted);margin-top:14px;max-width:520px;}
  .work-grid{padding:32px;display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
  .work-grid .wcard:first-child{grid-column:1 / -1;}
  .wcard{position:relative;aspect-ratio:4/3;overflow:hidden;border-radius:10px;cursor:pointer;background:var(--clay-mid);}
  .wcard:first-child{aspect-ratio:21/9;}
  .wcard .wfill{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--brick);background:var(--clay-tint);transition:transform .6s ease;}
  .wcard .wfill i{font-size:30px;opacity:.5;}
  .wcard .wfill .fn{font-size:10px;font-family:var(--mono);margin-top:6px;opacity:.7;}
  .wcard .wover{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:22px;opacity:0;transition:opacity .35s ease;
    background:linear-gradient(to top,rgba(18,11,7,0.85),rgba(18,11,7,0.15) 60%,transparent);}
  .wcard:hover .wover{opacity:1;}
  .wcard:hover .wfill{transform:scale(1.04);}
  .wcard .wover .wnum{font-family:var(--mono);font-size:12px;color:#F0C4B0;}
  .wcard .wover .wname{font-family:var(--display);font-size:24px;font-weight:500;color:#fff;line-height:1.1;margin-top:4px;}
  .wcard .wover .wcat{font-size:12.5px;color:rgba(255,255,255,0.8);margin-top:5px;}

  /* ---------- SKILLS ---------- */
  .skills{padding:8px 32px 16px;border-top:0.5px solid var(--line);padding-top:28px;}
  .skills .sk-title{font-family:var(--display);font-size:22px;font-weight:500;margin-bottom:22px;}
  .skills .sk-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px;}
  .skills .sk-col .sk-lbl{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--brick);margin-bottom:16px;}
  .skbar{margin-bottom:15px;}
  .skbar .skrow{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:6px;}
  .skbar .skrow .lvl{color:var(--hint);font-size:12px;}
  .skbar .track{height:5px;background:var(--paper-2);border-radius:4px;overflow:hidden;}
  .skbar .fill{height:100%;background:linear-gradient(to right,var(--clay),var(--brick));border-radius:4px;}
  .softskills{display:flex;flex-wrap:wrap;gap:9px;}
  .softskills .chip{font-size:13px;padding:7px 14px;border:0.5px solid var(--line-2);border-radius:20px;color:var(--ink);background:var(--paper);}

  /* ---------- ABOUT: education line, tool circles, languages line ---------- */
  .edu-line{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px 16px;padding:22px 32px;border-top:0.5px solid var(--line);}
  .edu-line .k{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--brick);}
  .edu-line .v{font-size:14.5px;}
  .edu-line .v b{font-weight:500;}
  .edu-line .wes{font-size:12.5px;color:var(--hint);}
  .tools-block{padding:8px 32px 16px;border-top:0.5px solid var(--line);padding-top:28px;}
  .tools-block .sk-lbl{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--brick);margin-bottom:20px;}
  .tools-row{display:flex;flex-wrap:wrap;gap:26px;}
  .tool{display:flex;flex-direction:column;align-items:center;gap:9px;width:80px;}
  .tool .circ{width:60px;height:60px;border-radius:50%;border:0.5px solid var(--line-2);background:var(--paper);display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s;}
  .tool .circ i{font-size:26px;color:var(--clay);}
  .tool .circ img{width:34px;height:34px;object-fit:contain;}
  .tool:hover .circ{background:var(--clay-tint);border-color:var(--clay);}
  .tool .tname{font-size:11.5px;color:var(--muted);text-align:center;line-height:1.3;}
  .lang-line{display:flex;flex-wrap:wrap;align-items:center;gap:10px 26px;padding:22px 32px 56px;border-top:0.5px solid var(--line);}

/* ============ RENDER HELPERS ============ */
function t(obj){ return obj ? (obj[lang] || obj.en) : ""; }

function imgSlot(img){
  const warm = img.warm ? " warm" : "";
  const r = img.r || "r43";
  const icon = img.icon || "ti-photo";
  return `<div class="imgslot ${r}${warm}">
    <i class="ti ${icon}"></i>
    <div class="cap">${t(img.cap)}</div>
    <div class="fn">${img.fn}</div>
  </div>`;
}
function imgBlock(item){
  if(item.pair){
    return `<div class="imgpair">${item.pair.map(imgSlot).join("")}</div>`;
  }
  if(item.quad){
    return `<div class="imgquad">${item.quad.map(imgSlot).join("")}</div>`;
  }
  if(item.tallRow){
    // a tall vertical image beside stacked smaller images
    return `<div class="imgtall-row">
      ${imgSlot(item.tallRow.tall)}
      <div style="display:flex;flex-direction:column;gap:16px;">${item.tallRow.stack.map(imgSlot).join("")}</div>
    </div>`;
  }
  return imgSlot(item);
}

/* ============ ROUTER ============ */
function go(id){
  current = id;
  const main = document.getElementById("main");
  let html="";
  if(id==="home") html=renderHome();
  else if(id==="work") html=renderWork();
  else if(id==="about") html=renderAbout();
  else if(id==="contact") html=renderContact();
  else {
    const i = projects.findIndex(p=>p.id===id);
    if(i>=0) html=renderProject(projects[i], i);
    else html=renderHome();
  }
  main.innerHTML = `<div class="page active">${html}</div>`;
  const isProject = projects.some(p=>p.id===id);
  document.querySelectorAll('.nav-links a').forEach(a=>{
    const n=a.dataset.nav;
    a.classList.toggle('active', n===id || (isProject && n==='work'));
  });
  window.scrollTo({top:0,behavior:'instant'});
  if(id==="home") startHelloRotator(); else stopHelloRotator();
}

let helloTimer=null;
function startHelloRotator(){
  stopHelloRotator();
  const bg=document.getElementById('helloBg');
  if(!bg) return;
  const slides=[...bg.querySelectorAll('.slide')];
  // attempt to load real images; if present they replace the placeholder look
  slides.forEach(s=>{
    const src=s.dataset.src;
    const img=new Image();
    img.onload=()=>{ s.classList.remove('placeholder'); s.style.backgroundImage=`url('${src}')`; const sp=s.querySelector('span'); if(sp) sp.remove(); };
    img.src=src;
  });
  if(slides.length<2) return;
  let i=0;
  helloTimer=setInterval(()=>{
    slides[i].classList.remove('on');
    i=(i+1)%slides.length;
    slides[i].classList.add('on');
  },6000);
}
function stopHelloRotator(){ if(helloTimer){clearInterval(helloTimer);helloTimer=null;} }

function applyLang(){
  document.documentElement.lang = lang;
  document.getElementById('lang-en').className = lang==='en'?'':'off';
  document.getElementById('lang-fr').className = lang==='fr'?'':'off';
  document.querySelectorAll('[data-en]').forEach(el=>{
    el.innerHTML = lang==='en'?el.dataset.en:el.dataset.fr;
  });
  go(current);
}
function toggleLang(){ lang = lang==='en'?'fr':'en'; applyLang(); }

function toggleDock(){ document.getElementById('dock').classList.toggle('open'); }
document.addEventListener('click', function(e){
  const dock = document.getElementById('dock');
  if(dock && dock.classList.contains('open') && !dock.contains(e.target)){
    dock.classList.remove('open');
  }
});

go('home');
